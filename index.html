<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gibson Market Place - Support & Resources</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
            --accent: #dc2626;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: var(--dark);
            color: var(--light);
        }

        header {
            background-color: var(--primary);
            padding: 3rem 1rem;
            text-align: center;
        }

        header h1 { margin: 0; font-size: 2.5rem; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .product-card {
            background-color: var(--light);
            border-radius: 8px;
            color: var(--dark);
            padding: 20px;
            text-align: center;
        }

        .product-card img {
            max-width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .buy-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Gibson Market Place</h1>
        <p>Discover specialized tools and resources.</p>
    </header>

    <main id="product-grid" class="grid-container">
        <!-- JavaScript will inject products here -->
    </main>

    <script>
        // ADD NEW PRODUCTS HERE
        const products = [
            { name: "Recovery Toolkit", price: "$49.99", img: "images/tool1.png" },
            { name: "Guided Journal", price: "$19.99", img: "images/book1.png" },
            { name: "Wellness Program", price: "$99.99", img: "images/program1.png" }
        ];

        const grid = document.getElementById('product-grid');
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${product.img}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p>${product.price}</p>
                <button class="buy-btn">View Details</button>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
