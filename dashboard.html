<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gibson - Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-20">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        <header id="mainHeader" class="p-16 bg-indigo-900 text-white bg-cover bg-center transition-all duration-500">
            <h1 id="headerTitle" class="text-3xl font-bold p-2 bg-black/20 inline-block rounded">Gibson Marketplace</h1>
        </header>

        <div class="p-4 bg-slate-900 text-white border-b-4 border-indigo-500">
            <h2 class="text-[10px] font-bold uppercase text-indigo-400 mb-2">Admin: Set Header Photo</h2>
            <div class="flex gap-2">
                <input type="text" id="headerImgInput" placeholder="Filename (e.g. 1000362042.jpg)" class="flex-1 p-2 text-black rounded text-sm">
                <button onclick="changeHeaderImage()" class="bg-indigo-600 px-4 py-2 rounded font-bold text-sm">Apply Photo</button>
            </div>
        </div>

        <div class="p-6 space-y-4">
            <h2 class="text-xl font-bold">Post New Item</h2>
            <input type="text" id="itemName" class="w-full p-2 border rounded" placeholder="Item Name">
            <input type="text" id="itemImg" class="w-full p-2 border rounded" placeholder="Image Filename (e.g. 1000362042.jpg)">
            <button onclick="postItem()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">Post Item</button>
        </div>

        <div id="listingsFeed" class="p-6 space-y-4"></div>
    </div>

    <script>
        function changeHeaderImage() {
            const newUrl = document.getElementById('headerImgInput').value;
            document.getElementById('mainHeader').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('${newUrl}')`;
        }

        function postItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const feed = document.getElementById('listingsFeed');
            const div = document.createElement('div');
            div.className = "border p-4 rounded-xl shadow-sm";
            div.innerHTML = `<img src="${img}" class="w-full h-40 object-cover rounded-lg mb-2">
                             <h3 class="font-bold text-lg">${name}</h3>`;
            feed.prepend(div);
        }
    </script>
</body>
</html>
