<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gibson - Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 pb-20">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        <header class="p-6 bg-indigo-900 text-white">
            <h1 class="text-2xl font-bold">Gibson Marketplace</h1>
            <p class="text-indigo-300">Post an item for sale</p>
        </header>

        <div class="p-6 space-y-4">
            <div class="bg-gray-50 p-4 rounded-xl border border-dashed border-gray-300">
                <label class="block text-sm font-bold mb-2">Item Name</label>
                <input type="text" id="itemName" class="w-full p-2 border rounded" placeholder="e.g. Graduation Gown">
                
                <label class="block text-sm font-bold mt-3 mb-2">Price ($)</label>
                <input type="number" id="itemPrice" class="w-full p-2 border rounded" placeholder="0.00">
                
                <label class="block text-sm font-bold mt-3 mb-2">Location</label>
                <input type="text" id="itemLoc" class="w-full p-2 border rounded" placeholder="City/Area">

                <label class="block text-sm font-bold mt-3 mb-2">Image URL</label>
                <input type="text" id="itemImg" class="w-full p-2 border rounded" placeholder="Paste image link here">

                <button onclick="postItem()" class="w-full mt-5 bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700">
                    Post Item
                </button>
            </div>

            <h2 class="text-lg font-bold mt-6">Recent Listings</h2>
            <div id="listingsFeed" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        function postItem() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const loc = document.getElementById('itemLoc').value;
            const img = document.getElementById('itemImg').value;
            
            const feed = document.getElementById('listingsFeed');
            const newListing = document.createElement('div');
            newListing.className = "p-4 bg-white border rounded-xl shadow-sm";
            newListing.innerHTML = `
                ${img ? `<img src="${img}" class="w-full h-40 object-cover rounded-lg mb-3">` : ''}
                <h3 class="font-bold text-lg">${name}</h3>
                <p class="text-emerald-600 font-semibold">$${price}</p>
                <p class="text-gray-500 text-sm italic">📍 ${loc}</p>`;
            feed.prepend(newListing);
            
            // Clear inputs
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemLoc').value = '';
            document.getElementById('itemImg').value = '';
        }
    </script>
</body>
</html>
