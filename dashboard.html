<!DOCTYPE html>

    <title>Gibson - Recovery Dashboard</title>

                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span>Community Feed</span>
                </a>
                <a href="#" class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition">

            </nav>

                    </a>
                </div>
            </header>

                    </div>
                    <div class="bg-indigo-500/20 text-indigo-300 p-2.5 rounded-lg border border-indigo-500/20">
                        <i data-lucide="award" class="w-6 h-6"></i>
                    </div>
                </div>
